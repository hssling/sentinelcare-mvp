<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="260" viewBox="0 0 1400 260">
  <style>
    .b{fill:#f2f5f7;stroke:#234;stroke-width:2}.t{font:700 24px Arial}.s{font:16px Arial;fill:#234}.a{stroke:#234;stroke-width:3;marker-end:url(#m)}
  </style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#234"/></marker></defs>
  <rect class="b" x="20" y="60" width="190" height="80" rx="10"/><text class="t" x="115" y="108" text-anchor="middle">Intent</text>
  <rect class="b" x="245" y="60" width="190" height="80" rx="10"/><text class="t" x="340" y="108" text-anchor="middle">Action</text>
  <rect class="b" x="470" y="60" width="190" height="80" rx="10"/><text class="t" x="565" y="108" text-anchor="middle">Confirmation</text>
  <rect class="b" x="695" y="60" width="190" height="80" rx="10"/><text class="t" x="790" y="108" text-anchor="middle">Response</text>
  <rect class="b" x="920" y="60" width="190" height="80" rx="10"/><text class="t" x="1015" y="108" text-anchor="middle">Follow-up</text>
  <rect class="b" x="1145" y="60" width="190" height="80" rx="10"/><text class="t" x="1240" y="108" text-anchor="middle">Closure</text>
  <line class="a" x1="210" y1="100" x2="245" y2="100"/><line class="a" x1="435" y1="100" x2="470" y2="100"/><line class="a" x1="660" y1="100" x2="695" y2="100"/><line class="a" x1="885" y1="100" x2="920" y2="100"/><line class="a" x1="1110" y1="100" x2="1145" y2="100"/>
  <text class="s" x="700" y="190" text-anchor="middle">Failure modes: missing action, delayed action, contradictory evidence, absent owner, acknowledgment without closure</text>
</svg>
