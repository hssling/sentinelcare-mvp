<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520"><style>.c{fill:#f4f8fb;stroke:#1f3a4d;stroke-width:2}.t{font:700 18px Arial}.s{font:14px Arial}</style><text class="t" x="550" y="35" text-anchor="middle">Ten-domain SentinelCare patient safety taxonomy</text><g>
<rect class="c" x="40" y="70" width="300" height="60" rx="10"/><text class="s" x="190" y="105" text-anchor="middle">1. Medication safety</text>
<rect class="c" x="400" y="70" width="300" height="60" rx="10"/><text class="s" x="550" y="105" text-anchor="middle">2. Diagnostic safety</text>
<rect class="c" x="760" y="70" width="300" height="60" rx="10"/><text class="s" x="910" y="105" text-anchor="middle">3. Procedure and surgical safety</text>
<rect class="c" x="40" y="160" width="300" height="60" rx="10"/><text class="s" x="190" y="195" text-anchor="middle">4. Deterioration surveillance</text>
