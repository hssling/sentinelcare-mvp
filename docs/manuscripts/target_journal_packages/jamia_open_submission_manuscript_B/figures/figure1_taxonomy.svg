<rect class="c" x="40" y="250" width="300" height="60" rx="10"/><text class="s" x="190" y="285" text-anchor="middle">7. Care transition safety</text>
<rect class="c" x="400" y="250" width="300" height="60" rx="10"/><text class="s" x="550" y="285" text-anchor="middle">8. Documentation and communication safety</text>
<rect class="c" x="760" y="250" width="300" height="60" rx="10"/><text class="s" x="910" y="285" text-anchor="middle">9. Device and equipment safety</text>
<rect class="c" x="400" y="340" width="300" height="60" rx="10"/><text class="s" x="550" y="375" text-anchor="middle">10. Operational safety</text>
</g></svg>
