<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260"><style>.c{fill:#f4f8fb;stroke:#1f3a4d;stroke-width:2}.t{font:700 20px Arial}.s{font:14px Arial}</style><text class="t" x="600" y="30" text-anchor="middle">Four-stage validation pathway</text><rect class="c" x="20" y="90" width="260" height="80" rx="10"/><text class="s" x="150" y="130" text-anchor="middle">1. Retrospective benchmarking</text><rect class="c" x="315" y="90" width="260" height="80" rx="10"/><text class="s" x="445" y="130" text-anchor="middle">2. Silent prospective validation</text><rect class="c" x="610" y="90" width="260" height="80" rx="10"/><text class="s" x="740" y="130" text-anchor="middle">3. Controlled live pilot</text><rect class="c" x="905" y="90" width="260" height="80" rx="10"/><text class="s" x="1035" y="130" text-anchor="middle">4. Conditional scale-up</text></svg>
