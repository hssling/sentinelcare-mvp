<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f7f2e9"/>
  <text x="60" y="70" font-family="Georgia, serif" font-size="32" fill="#18251f">Figure 1. Federated operating model for patient safety surveillance in India</text>
  <rect x="60" y="130" width="320" height="470" rx="28" fill="#eef7f3" stroke="#0e6b56" stroke-width="2"/>
  <rect x="440" y="130" width="320" height="470" rx="28" fill="#f7f4ee" stroke="#b85a24" stroke-width="2"/>
  <rect x="820" y="130" width="320" height="470" rx="28" fill="#f0f2ec" stroke="#18251f" stroke-width="2"/>
  <text x="90" y="180" font-family="Arial" font-size="28" font-weight="700" fill="#0b5243">Facility layer</text>
  <text x="470" y="180" font-family="Arial" font-size="28" font-weight="700" fill="#8d451d">State layer</text>
  <text x="850" y="180" font-family="Arial" font-size="28" font-weight="700" fill="#18251f">National layer</text>
  <text x="90" y="235" font-family="Arial" font-size="22" fill="#22322b">• Daily departmental surveillance</text>
  <text x="90" y="275" font-family="Arial" font-size="22" fill="#22322b">• Event-level case intake</text>
  <text x="90" y="315" font-family="Arial" font-size="22" fill="#22322b">• Immediate containment action</text>
  <text x="90" y="355" font-family="Arial" font-size="22" fill="#22322b">• Local review and CAPA initiation</text>
  <text x="90" y="395" font-family="Arial" font-size="22" fill="#22322b">• Facility quality and safety oversight</text>
  <text x="470" y="235" font-family="Arial" font-size="22" fill="#3c2e23">• State surveillance cell aggregation</text>
  <text x="470" y="275" font-family="Arial" font-size="22" fill="#3c2e23">• Signal detection and triage</text>
  <text x="470" y="315" font-family="Arial" font-size="22" fill="#3c2e23">• Escalation and comparative review</text>
  <text x="470" y="355" font-family="Arial" font-size="22" fill="#3c2e23">• Supportive governance feedback</text>
  <text x="470" y="395" font-family="Arial" font-size="22" fill="#3c2e23">• Cross-facility learning synthesis</text>
  <text x="850" y="235" font-family="Arial" font-size="22" fill="#22322b">• Benchmarking and oversight</text>
  <text x="850" y="275" font-family="Arial" font-size="22" fill="#22322b">• Policy review and prioritization</text>
  <text x="850" y="315" font-family="Arial" font-size="22" fill="#22322b">• National surveillance intelligence</text>
  <text x="850" y="355" font-family="Arial" font-size="22" fill="#22322b">• Publication and public health learning</text>
  <text x="850" y="395" font-family="Arial" font-size="22" fill="#22322b">• Prevention-oriented governance</text>
  <rect x="250" y="635" width="700" height="78" rx="24" fill="#ffffff" stroke="#d1d8d2" stroke-width="1.5"/>
  <text x="300" y="682" font-family="Arial" font-size="24" fill="#18251f">Digital interoperability, taxonomy, audit, CAPA, and bounded AI assistance span all layers</text>
  <path d="M380 365 C420 365 420 365 440 365" fill="none" stroke="#0e6b56" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M760 365 C800 365 800 365 820 365" fill="none" stroke="#b85a24" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#18251f"/>
    </marker>
  </defs>
</svg>
