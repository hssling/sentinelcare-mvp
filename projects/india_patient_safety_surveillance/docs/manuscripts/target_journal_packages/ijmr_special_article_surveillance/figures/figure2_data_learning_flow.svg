  <text x="100" y="350" font-family="Arial" font-size="24" font-weight="700" fill="#0b5243">Manual event-case intake</text>
  <text x="100" y="520" font-family="Arial" font-size="24" font-weight="700" fill="#0b5243">Digital and future SentinelCare feeds</text>
  <text x="495" y="305" font-family="Arial" font-size="28" font-weight="700" fill="#8d451d">Safety intelligence layer</text>
  <text x="495" y="355" font-family="Arial" font-size="22" fill="#3c2e23">• normalization and taxonomy mapping</text>
  <text x="495" y="390" font-family="Arial" font-size="22" fill="#3c2e23">• triage and case review routing</text>
  <text x="495" y="425" font-family="Arial" font-size="22" fill="#3c2e23">• trend analytics and signal detection</text>
  <text x="495" y="460" font-family="Arial" font-size="22" fill="#3c2e23">• AI-assisted summarization and clustering</text>
  <text x="495" y="495" font-family="Arial" font-size="22" fill="#3c2e23">• CAPA, audit, and governance traceability</text>
  <text x="892" y="205" font-family="Arial" font-size="24" font-weight="700" fill="#18251f">Facility action and review</text>
  <text x="892" y="375" font-family="Arial" font-size="24" font-weight="700" fill="#18251f">State aggregation and escalation</text>
  <text x="892" y="545" font-family="Arial" font-size="24" font-weight="700" fill="#18251f">National learning and policy</text>
