services:
  - type: web
    name: india-patient-safety-surveillance-api
    env: python
    plan: starter
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: uvicorn indiasurveillance.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
